services:
  - type: web
    name: ai-video-understanding-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: VIDEO_ACTION_MODEL
        value: videomae
      - key: PYTHON_VERSION
        value: 3.11.11
