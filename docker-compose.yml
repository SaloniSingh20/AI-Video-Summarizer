version: "3.9"

services:
  backend:
    build: ./backend
    container_name: ai-backend
    env_file:
      - .env
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    image: node:20-alpine
    container_name: ai-frontend-app
    working_dir: /app
    command: sh -c "npm install --no-fund --no-audit && npm run dev -- --port 3000"
    volumes:
      - ../frontend:/app
    environment:
      - API_PROXY_TARGET=http://backend:8000
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: ai-frontend
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
